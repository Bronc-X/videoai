<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Model Generation Wait State</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07090b;
        color: #f4eee5;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 68% 48%, rgba(255, 143, 36, 0.16), transparent 28rem),
          radial-gradient(circle at 50% 64%, rgba(66, 190, 205, 0.11), transparent 30rem),
          linear-gradient(180deg, #111417, #060708);
      }

      .stage {
        position: relative;
        width: min(1120px, calc(100vw - 32px));
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border: 1px solid rgba(255, 210, 160, 0.14);
        border-radius: 8px;
        background: #050607;
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.54);
      }

      video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.88;
      }

      .hud {
        position: absolute;
        left: clamp(24px, 5vw, 56px);
        top: clamp(22px, 5vw, 52px);
        width: min(340px, 44vw);
        color: rgba(244, 238, 229, 0.92);
      }

      .percent {
        font-size: clamp(36px, 6vw, 68px);
        line-height: 0.95;
        font-weight: 300;
        color: #ffb252;
        text-shadow: 0 0 28px rgba(255, 139, 39, 0.30);
      }

      .label {
        margin-top: 18px;
        font-size: 12px;
        letter-spacing: 0.18em;
        color: rgba(244, 238, 229, 0.62);
        text-transform: uppercase;
      }

      .bar {
        height: 4px;
        margin-top: 14px;
        background: rgba(244, 238, 229, 0.14);
      }

      .bar > i {
        display: block;
        width: calc(var(--progress) * 1%);
        height: 100%;
        background: linear-gradient(90deg, #ff9f2e, #ffd18d);
        box-shadow: 0 0 18px rgba(255, 164, 55, 0.4);
      }

      .steps {
        display: grid;
        gap: 10px;
        margin-top: 22px;
        color: rgba(244, 238, 229, 0.52);
        font-size: 13px;
      }

      .steps span[data-active="true"] {
        color: rgba(244, 238, 229, 0.92);
      }
    </style>
  </head>
  <body>
    <section class="stage" style="--progress: 68">
      <video src="./renders/print_loading_preview.mp4" poster="./renders/print_loading_preview_poster.jpg" autoplay muted loop playsinline></video>
      <div class="hud">
        <div class="percent" id="percent">68%</div>
        <div class="label" id="label">Building model layers</div>
        <div class="bar"><i></i></div>
        <div class="steps">
          <span>Analyze source image</span>
          <span data-active="true">Build printable geometry</span>
          <span>Refine surface details</span>
          <span>Prepare 3D preview</span>
        </div>
      </div>
    </section>
    <script>
      const stage = document.querySelector(".stage");
      const percent = document.querySelector("#percent");
      const label = document.querySelector("#label");
      let progress = 18;

      setInterval(() => {
        progress = progress >= 94 ? 18 : progress + 1;
        stage.style.setProperty("--progress", progress);
        percent.textContent = `${progress}%`;
        label.textContent =
          progress < 32
            ? "Analyzing image structure"
            : progress < 76
              ? "Building model layers"
              : "Refining printable mesh";
      }, 520);
    </script>
  </body>
</html>
