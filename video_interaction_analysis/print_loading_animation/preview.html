<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Print Loading Animation Preview</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #080a0c;
        color: #eef4f0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 48%, rgba(70, 210, 220, 0.12), transparent 32rem),
          linear-gradient(180deg, #101316, #070809);
      }

      main {
        width: min(960px, calc(100vw - 32px));
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        background: #050607;
        border: 1px solid rgba(180, 220, 220, 0.18);
        border-radius: 8px;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
      }

      .meta {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-top: 14px;
        color: rgba(238, 244, 240, 0.68);
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <video src="./renders/print_loading_preview.mp4" poster="./renders/print_loading_preview_poster.jpg" autoplay muted loop playsinline controls></video>
      <div class="meta">
        <span>12s loop preview</span>
        <span>Blender final render script included</span>
      </div>
    </main>
  </body>
</html>
