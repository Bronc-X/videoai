<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stock Video Wait State</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07090b;
        color: #f4f7f4;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 48%, rgba(42, 230, 198, 0.12), transparent 30rem),
          linear-gradient(180deg, #101316, #060708);
      }

      .wait-state {
        position: relative;
        width: min(1120px, calc(100vw - 32px));
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border-radius: 10px;
        background: #050607;
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.56);
        isolation: isolate;
      }

      .video-feather {
        position: absolute;
        inset: -1px;
        overflow: hidden;
        background: #050607;
      }

      .video-feather video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scale(1.035);
        filter: saturate(0.92) contrast(1.04) brightness(0.72);
        -webkit-mask-image:
          linear-gradient(to right, transparent 0, #000 8%, #000 88%, transparent 100%),
          linear-gradient(to bottom, transparent 0, #000 10%, #000 86%, transparent 100%);
        -webkit-mask-composite: source-in;
        mask-image:
          linear-gradient(to right, transparent 0, #000 8%, #000 88%, transparent 100%),
          linear-gradient(to bottom, transparent 0, #000 10%, #000 86%, transparent 100%);
        mask-composite: intersect;
      }

      .video-feather::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 50% 52%, transparent 0 38%, rgba(5, 6, 7, 0.42) 72%, rgba(5, 6, 7, 0.88) 100%),
          linear-gradient(90deg, rgba(5, 6, 7, 0.78), rgba(5, 6, 7, 0.12) 44%, rgba(5, 6, 7, 0.58));
      }

      .hud {
        position: absolute;
        left: clamp(24px, 5vw, 56px);
        top: clamp(24px, 5vw, 54px);
        width: min(340px, 42vw);
        z-index: 2;
      }

      .percent {
        font-size: clamp(36px, 6vw, 64px);
        line-height: 1;
        font-weight: 300;
        color: #d7fff2;
        text-shadow: 0 0 24px rgba(88, 255, 220, 0.32);
      }

      .label {
        margin-top: 16px;
        font-size: 12px;
        letter-spacing: 0.18em;
        color: rgba(234, 247, 244, 0.72);
        text-transform: uppercase;
      }

      .bar {
        height: 4px;
        margin-top: 14px;
        background: rgba(238, 248, 246, 0.14);
      }

      .bar i {
        display: block;
        width: 68%;
        height: 100%;
        background: linear-gradient(90deg, #43ffd9, #d5fff3);
        box-shadow: 0 0 20px rgba(74, 255, 220, 0.44);
      }
    </style>
  </head>
  <body>
    <section class="wait-state">
      <div class="video-feather">
        <video
          poster="./pexels_30318835_loopable_poster.jpg"
          autoplay
          muted
          loop
          playsinline
        >
          <source src="./pexels_30318835_loopable_pingpong_1080p_vp9.webm" type="video/webm" />
          <source src="./pexels_30318835_loopable_pingpong_1080p_h264.mp4" type="video/mp4" />
        </video>
      </div>
      <div class="hud">
        <div class="percent">68%</div>
        <div class="label">Building printable geometry</div>
        <div class="bar"><i></i></div>
      </div>
    </section>
  </body>
</html>
